<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-Bank Clone</title>
    <style>
        :root {
            --bg-black: #000000;
            --card-bg: #1c1c1e;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-black);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow-x: hidden;
        }

        /* Контейнер приложения */
        .app-wrapper {
            position: relative;
            width: 100%;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            background: url('фон.jpg') no-repeat top center;
            background-size: 100%;
        }

        /* Слой для элементов, чтобы они перекрывали фон в нужных местах */
        .element {
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .element:active { transform: scale(0.98); }

        /* Поиск */
        .search-bar {
            top: 178px; left: 16px; right: 16px;
            height: 44px;
            background-image: url('поиск.jpg');
        }

        /* Кэшбэк и бонусы */
        .bonus-section {
            top: 448px; right: 16px;
            width: 180px; height: 160px;
            background-image: url('бонус кэш.jpg');
        }

        /* Мой счет (Карта) */
        .account-section {
            top: 628px; left: 16px; right: 16px;
            height: 165px;
            background-image: url('карта.jpg');
        }

        /* Новый квест */
        .quest-section {
            top: 808px; left: 16px; right: 16px;
            height: 120px;
            background-image: url('новый квест.jpg');
        }

        /* Модальное окно карты */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; z-index: 100;
        }
        .bottom-sheet {
            position: fixed; bottom: -100%; left: 0; width: 100%;
            height: 70vh; background: #151517; border-radius: 20px 20px 0 0;
            z-index: 200; transition: transform 0.4s ease;
            padding: 20px; box-sizing: border-box; text-align: center;
        }
        .bottom-sheet.open { transform: translateY(-100%); }
        .card-big {
            width: 100%; border-radius: 15px; margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <!-- Интерактивные элементы поверх фона -->
    <div class="element search-bar" onclick="alert('Поиск...')"></div>
    <div class="element bonus-section" onclick="alert('Кэшбэк открыт')"></div>
    <div class="element account-section" onclick="openCard()"></div>
    <div class="element quest-section" onclick="alert('Квест начат!')"></div>
</div>

<!-- Окно при клике на карту -->
<div class="modal-overlay" id="overlay" onclick="closeCard()"></div>
<div class="bottom-sheet" id="sheet">
    <div style="width: 40px; height: 4px; background: #333; margin: 0 auto 15px; border-radius: 2px;"></div>
    <h2 style="color: white; margin: 0;">Ваша карта</h2>
    <!-- Здесь используем ту же картинку карты, но крупнее -->
    <img src="карта.jpg" class="card-big">
    <p style="color: #8e8e93; margin-top: 20px;">Баланс: 5,41 ₽</p>
    <button onclick="closeCard()" style="width: 100%; padding: 15px; border-radius: 12px; border: none; background: #2c2c2e; color: white; font-weight: bold; margin-top: 20px;">Закрыть</button>
</div>

<script>
    function openCard() {
        document.getElementById('sheet').classList.add('open');
        document.getElementById('overlay').style.display = 'block';
    }
    function closeCard() {
        document.getElementById('sheet').classList.remove('open');
        document.getElementById('overlay').style.display = 'none';
    }
</script>

</body>
</html>
