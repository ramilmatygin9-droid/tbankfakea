<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-Bank App</title>
    <style>
        :root {
            --bg-black: #0b0b0c;
            --card-gray: #1c1c1e;
            --text-secondary: #8e8e93;
        }

        body {
            margin: 0;
            background-color: var(--bg-black);
            font-family: -apple-system, sans-serif;
            color: white;
            overflow-x: hidden;
        }

        .phone-screen {
            width: 100%;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            background: url('интерфейс_2.jpg') no-repeat top center;
            background-size: 100%;
            position: relative;
        }

        /* Прозрачная зона поверх карты на главном экране */
        .account-trigger {
            position: absolute;
            top: 625px; left: 16px; right: 16px;
            height: 160px;
            cursor: pointer;
            z-index: 10;
        }

        /* Темная подложка при открытии меню */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none; z-index: 100;
        }

        /* Выезжающее меню (Bottom Sheet) */
        .bottom-sheet {
            position: fixed; bottom: -100%; left: 0; width: 100%;
            height: 85vh; background: var(--bg-black);
            border-radius: 24px 24px 0 0; z-index: 200;
            transition: transform 0.4s cubic-bezier(0.32, 1, 0.23, 1);
            padding: 20px; box-sizing: border-box;
            overflow-y: auto;
        }
        .bottom-sheet.active { transform: translateY(-100%); }

        .handle { width: 40px; height: 4px; background: #333; border-radius: 2px; margin: 0 auto 20px; }

        /* Элементы внутри меню */
        .sheet-content img {
            width: 100%;
            border-radius: 20px;
            margin-bottom: 12px;
            display: block;
        }

        .balance-block {
            padding: 10px 0 20px;
        }
        .balance-sum { font-size: 32px; font-weight: 700; }
        .balance-label { color: var(--text-secondary); margin-top: 4px; }
    </style>
</head>
<body>

<div class="phone-screen">
    <!-- Зона клика на карту -->
    <div class="account-trigger" onclick="toggleMenu(true)"></div>
</div>

<!-- Оверлей и меню -->
<div class="modal-overlay" id="overlay" onclick="toggleMenu(false)"></div>
<div class="bottom-sheet" id="sheet">
    <div class="handle"></div>
    
    <div class="sheet-content">
        <!-- Заголовок и баланс -->
        <div class="balance-block">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 style="margin: 0; font-size: 20px;">Мой счет</h2>
                <span style="color: var(--text-secondary); font-size: 20px;">⚙️</span>
            </div>
            <div class="balance-sum">5,41 ₽</div>
            <div class="balance-label">Текущий баланс</div>
        </div>

        <!-- Кнопки: Пополнить / Оплатить -->
        <img src="действия.jpg" alt="Действия">

        <!-- Сетка: Операции / Баллы / QR / Ссылка -->
        <img src="инфо_панель.jpg" alt="Информация по счету">

        <!-- Кнопка закрытия -->
        <button onclick="toggleMenu(false)" style="width: 100%; padding: 18px; background: #2c2c2e; border: none; border-radius: 16px; color: white; font-weight: 600; font-size: 16px; margin-top: 10px;">
            Закрыть
        </div>
    </div>
</div>

<script>
    function toggleMenu(show) {
        const sheet = document.getElementById('sheet');
        const overlay = document.getElementById('overlay');
        if(show) {
            sheet.classList.add('active');
            overlay.style.display = 'block';
        } else {
            sheet.classList.remove('active');
            overlay.style.display = 'none';
        }
    }
</script>

</body>
</html>
