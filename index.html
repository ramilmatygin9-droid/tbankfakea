<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-Bank App</title>
    <style>
        :root {
            --bg-black: #0b0b0c;
            --card-gray: #1c1c1e;
            --t-yellow: #ffdd2d;
            --text-main: #ffffff;
            --text-secondary: #8e8e93;
        }

        body {
            margin: 0;
            background-color: var(--bg-black);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        .phone-screen {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            position: relative;
            overflow-y: auto;
            padding-bottom: 80px; /* Для нижнего меню */
        }

        /* Шапка с именем */
        .header {
            padding: 50px 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #3a3a3c;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
        }

        .user-name {
            font-size: 24px;
            font-weight: 700;
        }

        /* Поиск */
        .search-container {
            padding: 0 16px;
            margin-bottom: 20px;
        }
        .search-img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            content: url('поиск.jpg'); /* Твой файл */
        }

        /* Секция с кэшбэком */
        .grid-sections {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 0 16px;
            margin-bottom: 20px;
        }

        .bonus-card {
            grid-column: 2;
            width: 100%;
            border-radius: 20px;
            content: url('бонус кэш.jpg'); /* Твой файл */
        }

        /* Карточка счета */
        .account-card {
            margin: 0 16px 20px;
            cursor: pointer;
        }
        .account-img {
            width: 100%;
            border-radius: 24px;
            content: url('карта.jpg'); /* Твой файл */
        }

        /* Квест */
        .quest-container {
            padding: 0 16px;
        }
        .quest-img {
            width: 100%;
            border-radius: 20px;
            content: url('новый квест.jpg'); /* Твой файл */
        }

        /* Нижнее навигационное меню */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 430px;
            height: 70px;
            background: rgba(21, 21, 23, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #2c2c2e;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            color: var(--text-secondary);
        }

        .nav-item.active { color: #007aff; }
        .nav-icon { width: 24px; height: 24px; margin-bottom: 4px; background: #333; border-radius: 4px; }

    </style>
</head>
<body>

<div class="phone-screen">
    <!-- Имя и аватар созданы кодом -->
    <div class="header">
        <div class="profile">
            <div class="avatar">М</div>
            <div class="user-name">Матыгин ›</div>
        </div>
        <div style="background: #2c2c2e; padding: 8px 12px; border-radius: 12px; font-size: 14px; font-weight: 600;">
            Бонус за друга
        </div>
    </div>

    <div class="search-container">
        <img class="search-img" alt="Поиск">
    </div>

    <div class="grid-sections">
        <div style="background: var(--card-gray); border-radius: 20px; padding: 15px;">
            <div style="color: var(--text-secondary);">Все операции</div>
            <div style="font-size: 18px; margin-top: 5px;">Трат в мае 1 159 ₽</div>
        </div>
        <img class="bonus-card" alt="Кэшбэк">
    </div>

    <div class="account-card" onclick="alert('Открываем детали счета...')">
        <img class="account-img" alt="Счет">
    </div>

    <div class="quest-container">
        <img class="quest-img" alt="Квест">
    </div>

    <!-- Нижнее меню как на макете -->
    <div class="nav-bar">
        <div class="nav-item active">
            <div class="nav-icon" style="background: #ffdd2d;"></div>
            Главная
        </div>
        <div class="nav-item">
            <div class="nav-icon"></div>
            Платежи
        </div>
        <div class="nav-item">
            <div class="nav-icon"></div>
            Город
        </div>
        <div class="nav-item">
            <div class="nav-icon"></div>
            Чат
        </div>
    </div>
</div>

</body>
</html>
